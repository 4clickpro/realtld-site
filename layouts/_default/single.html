<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | RealTLD</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; padding: 2rem; max-width: 800px; margin: 0 auto; color: #333; }
        h1 { color: #2563eb; }
        h2, h3 { color: #1e40af; margin-top: 2rem; }
        a { color: #2563eb; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        .back-link { display: inline-block; margin-bottom: 2rem; font-size: 0.9em; }
        .article-content { margin-top: 2rem; }
    </style>
</head>
<body>
    <a href="/" class="back-link">← Back to Home</a>
    <h1>{{ .Title }}</h1>
    <div class="article-content">
        {{ .Content }}
    </div>
</body>
</html>
